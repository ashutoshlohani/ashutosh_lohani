<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <link rel="icon" type="image/x-icon" href="/favicon.ico" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <meta name="description"
      content="Ashutosh Lohani — Frontend Engineer specializing in React.js, Next.js, and modern web development." />
   <meta name="keywords" content="web design, web development, frontend, React, Next.js, portfolio, Ashutosh Lohani" />
   <meta name="author" content="Ashutosh Lohani" />
   <title>Ashutosh Lohani</title>

   <!-- Preconnect first -->
   <link rel="preconnect" href="https://fonts.googleapis.com" />
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

   <!-- Non-blocking font load -->
   <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" />
   <!-- ✅ Fixed noscript — just a plain stylesheet, no onload -->
   <noscript>
      <link
         href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
         rel="stylesheet" />
   </noscript>

   <!-- Critical CSS — prevents render blocking -->
   <style>
      *,
      *::before,
      *::after {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
      }

      body {
         background: #000;
         color: #fff;
         font-family: 'DM Sans', sans-serif;
      }

      #root {
         min-height: 100vh;
      }
   </style>
</head>

<body>
   <div id="root"></div>
   <script type="module" src="/src/main.jsx"></script>
</body>

</html>
